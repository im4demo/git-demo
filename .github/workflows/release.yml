name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  merge-to-staging:
    name: Merge Main → Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into staging
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          git checkout staging
          git merge origin/main --no-edit
          git push origin staging

  merge-to-production:
    name: Merge Staging → Production
    needs: merge-to-staging
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge staging into production
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          git checkout production
          git merge origin/staging --no-edit
          git push origin production

  create-tag:
    name: Create Git Tag
    needs: merge-to-production
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        id: tag
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag "$VERSION"
          git push origin "$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub Release
    needs: create-tag
    runs-on: ubuntu-latest

    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.version }}
          name: Release ${{ needs.create-tag.outputs.version }}
          generate_release_notes: true