<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0077cc, #00b4db);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 350px;
            background: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            color: #0077cc;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #0077cc;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0077cc;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #005fa3;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #0077cc;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }

    </style>

</head>

<body>


<div class="login-box">

    <h2>Login</h2>

    <form>

        <div class="input-group">
            <label>Email</label>
            <input 
                type="email" 
                placeholder="Enter your email"
                required>
        </div>


        <div class="input-group">
            <label>Password</label>
            <input 
                type="password" 
                placeholder="Enter your password"
                required>
        </div>


        <div class="remember">
            <input type="checkbox">
            <label>Remember me</label>
        </div>


        <button type="submit">
            Login
        </button>


        <div class="links">
            <p>
                <a href="#">Forgot Password?</a>
            </p>

            <p>
                Don't have an account?
                <a href="#">Register</a>
            </p>
        </div>

    </form>

</div>


</body>
</html>
